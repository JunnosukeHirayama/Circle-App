services:
  db:
    image: postgres:16-alpine
    container_name: circle-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: circle
      POSTGRES_PASSWORD: circle
      POSTGRES_DB: circle_app
    ports:
      - "5432:5432"
    volumes:
      - circle_pgdata:/var/lib/postgresql/data

volumes:
  circle_pgdata:
